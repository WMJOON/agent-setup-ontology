# agent-setup-ontology — Framework Concept Definitions
# Schema for software categories and subtypes.
version: "0.2.0"

framework_base:
  what: The base definition for any software dependency in the AI stack.
  fields:
    complexity: "low, medium, high"
    local_capable: "True if it supports local models (e.g., Ollama)."
    mcp_support: "True if it natively supports the Model Context Protocol."
    runtime_support: "List of supported runtimes (e.g., ollama, openai)."

agent_orchestrator:
  what: Framework for managing autonomous AI agents.
  subtype_of: framework_base
  fields:
    multiagent: "True if it supports team-based swarm organization."

automation_tool:
  what: Framework for interacting with desktop/browser environments.
  subtype_of: framework_base
  fields:
    environment: "Target automation layer (e.g., RPA, Browser)."

ui_client:
  what: Front-end client for chatting or configuring the stack.
  subtype_of: framework_base
  fields:
    interface_type: "Web GUI, Desktop App, etc."

rag_engine:
  what: Framework for building retrieval-augmented generation pipelines.
  subtype_of: framework_base
  fields:
    pipeline_type: "Component-based or monolithic."

runtime_engine:
  what: Local LLM inference backend that executes model files.
  fields:
    engine_id: "ollama, llama.cpp, vllm"
    supported_formats: "List of model file formats supported (e.g., GGUF, safetensors)."
    openai_compat: "True if the engine exposes an OpenAI-compatible API endpoint."
