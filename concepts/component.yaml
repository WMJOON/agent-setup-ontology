# agent-setup-ontology — Component Concept Definitions
# Semantic definitions for hardware parts and OS.
version: "0.2.0"

os_platform:
  what: Operating System platform.
  fields:
    name: "Name of the OS (e.g. macOS, Windows, Linux)."

memory_component:
  what: System Memory (RAM) specification.
  fields:
    capacity_gb: "Size of memory in gigabytes."
    bandwidth_gbs: "Peak memory bandwidth (GB/s). Critical for LLM inference speed."

gpu_component:
  what: Graphics Processing Unit / Neural Accelerator.
  fields:
    accelerator_type: "integrated, dedicated_npu, dedicated_gpu"
    vram_gb: "Dedicated VRAM size. For integrated, this is 0 (uses system memory)."
    ttft_multiplier: "Time-to-first-token inference efficiency multiplier."
    tdp_w: "Thermal Design Power in watts."

component:
  what: Generic PC building block (legacy definition, merging into dedicated component schemas).
  fields:
    component_type:
      values: gpu, cpu, memory
    inference_tier: "The model quality tier this component enables."
    price_search_query: "A web search query string for finding current market prices."
