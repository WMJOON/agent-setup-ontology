# agent-setup-ontology — Component Concept Definitions
# Semantic definitions for hardware parts and OS.
version: "0.2.0"

os_platform:
  what: Operating System platform.
  fields:
    name: "Name of the OS (e.g. macOS, Windows, Linux)."

memory_component:
  what: System Memory (RAM) specification.
  fields:
    capacity_gb: "Size of memory in gigabytes."
    bandwidth_gbs: "Peak memory bandwidth in GB/s (float). Critical for LLM inference speed."
    price_search_query: "Web search query string for current market price lookup."

gpu_component:
  what: Graphics Processing Unit / Neural Accelerator.
  fields:
    accelerator_type: "integrated, dedicated_npu, discrete"
    vram_gb: "Dedicated VRAM size. 0 for integrated (uses system memory)."
    ttft_multiplier: "Time-to-first-token inference efficiency multiplier relative to M4 baseline."
    tdp_w: "Thermal Design Power in watts."
    price_search_query: "Web search query string for current market price lookup."

network_component:
  what: Network connectivity profile of the device.
  fields:
    connectivity: "always_on, intermittent, air_gapped"
    upload_mbps: "Peak upload bandwidth in Mbps."
