# agent-setup-ontology — Setup Profile Instances
# All setup_profile entries extracted from ontology.yaml.
version: "0.0.5"

setup_profiles:

  # ── Single device setups ───────────────────────────────

  - id: setup-mac-mini-openclaw
    label: "Personal Automation Server: Mac Mini M4 32GB + OpenClaw"
    devices: [mac_mini_m4_32gb]
    model: "qwen3.5:35b-a3b"
    framework: openclaw
    repo: repo-openclaw
    use_cases: [web_automation, file_automation, schedule_task]
    complexity: medium
    always_on: true
    monthly_cost: "$0 (local only)"
    note: >
      Silent, low-power (~20W) always-on automation server.
      35b-a3b MoE runs at ~20 t/s — responsive enough for browser tasks.
      OpenClaw connects to Telegram/Slack for remote control.
    setup_steps:
      - "ollama pull qwen3.5:35b-a3b"
      - "git clone https://github.com/openclaw/openclaw && cd openclaw"
      - "cp .env.example .env && set OLLAMA_HOST=http://localhost:11434"
      - "npm install && npm start"

  - id: setup-mac-mini-chat
    label: "Local ChatGPT: Mac Mini M4 16GB + Open WebUI"
    devices: [mac_mini_16gb]
    model: "qwen3.5:9b"
    framework: open-webui
    repo: repo-open-webui
    use_cases: [general_qa, writing_assistant, document_rag]
    complexity: low
    always_on: true
    monthly_cost: "$0"
    note: "Simplest personal AI server. No coding required after setup."
    setup_steps:
      - "ollama pull qwen3.5:9b"
      - "docker run -d -p 3000:8080 -e OLLAMA_BASE_URL=http://host.docker.internal:11434 ghcr.io/open-webui/open-webui:main"
      - "Open http://localhost:3000"

  - id: setup-dgx-spark-solo
    label: "High-Power Local AI: NVIDIA DGX Spark"
    devices: [nvidia_dgx_spark]
    model: "qwen3.5:72b"
    framework: qwen-agent
    repo: repo-qwen-agent
    use_cases: all
    complexity: medium
    always_on: true
    monthly_cost: "~$8 (electricity)"
    note: >
      128GB unified memory at 900 GB/s. Runs 72B models locally.
      2.5x faster after 2026 TensorRT-LLM update.
      Overkill for single-user but excellent for team inference server.
    setup_steps:
      - "ollama pull qwen3.5:72b   # or qwen3.5:35b-a3b for faster response"
      - "pip install qwen-agent"

  # ── Multi-device (hybrid) setups ───────────────────────

  - id: setup-mac-mini-dgx-hybrid
    label: "Hybrid AI Stack: Mac Mini M4 32GB + DGX Spark"
    devices: [mac_mini_m4_32gb, nvidia_dgx_spark]
    roles:
      mac_mini_m4_32gb: "Control plane — daily tasks, light inference (9B-35B)"
      nvidia_dgx_spark: "Inference server — heavy models (72B+), batch jobs"
    model_light: "qwen3.5:35b-a3b"
    model_heavy: "qwen3.5:72b"
    framework: qwen-agent
    repo: repo-qwen-agent
    use_cases: all
    complexity: medium
    always_on: true
    monthly_cost: "~$11 (both devices)"
    note: >
      Mac Mini handles everyday agent tasks with 35b-a3b MoE (~20 t/s).
      DGX Spark handles demanding jobs: deep research, agent evaluation,
      fine-tuning, 72B inference. Point Ollama on Mac Mini to DGX Spark
      via OLLAMA_HOST for transparent model routing.
    setup_steps:
      - "# On DGX Spark:"
      - "OLLAMA_HOST=0.0.0.0:11434 ollama serve"
      - "ollama pull qwen3.5:72b"
      - "# On Mac Mini (point to DGX Spark for heavy models):"
      - "export OLLAMA_HOST=http://[dgx-spark-ip]:11434"
      - "ollama pull qwen3.5:35b-a3b   # stays local on Mac Mini"
      - "pip install qwen-agent"

  - id: setup-mac-mini-rtx-hybrid
    label: "Hybrid AI Stack: Mac Mini M4 32GB + PC RTX 4090"
    devices: [mac_mini_m4_32gb, pc_rtx4090]
    roles:
      mac_mini_m4_32gb: "Always-on control plane — chat, automation, scheduling"
      pc_rtx4090: "GPU inference server — when high speed or large models needed"
    model_light: "qwen3.5:9b"
    model_heavy: "qwen3.5:27b"
    framework: smolagents
    repo: repo-smolagents
    use_cases: all
    complexity: medium
    always_on: false
    note: >
      Budget-friendly alternative to DGX Spark hybrid.
      Mac Mini silent and always on; RTX 4090 PC for power-user sessions.
    setup_steps:
      - "# On PC (RTX 4090 inference server):"
      - "OLLAMA_HOST=0.0.0.0:11434 ollama serve && ollama pull qwen3.5:27b"
      - "# On Mac Mini:"
      - "ollama pull qwen3.5:9b   # local fallback"
      - "pip install smolagents[ollama]"

  - id: setup-mac-mini-personal-assistant
    label: "Personal Assistant Hub: Mac Mini M4 32GB + OpenClaw"
    devices: [mac_mini_m4_32gb]
    model: "qwen3.5:35b-a3b"
    framework: openclaw
    repo: repo-openclaw
    use_cases: [personal_assistant, schedule_task, file_automation, obsidian_assistant]
    complexity: medium
    always_on: true
    monthly_cost: "$0 (local only)"
    note: >
      Best single-box setup for a private always-on assistant that can message, read files,
      automate browser tasks, and work on a personal knowledge base.
    setup_steps:
      - "ollama pull qwen3.5:35b-a3b"
      - "git clone https://github.com/openclaw/openclaw && cd openclaw"
      - "cp .env.example .env && set OLLAMA_HOST=http://localhost:11434"
      - "npm install && npm start"

  - id: setup-mac-mini-rag-server
    label: "Local Knowledge Server: Mac Mini M4 24GB + Open WebUI"
    devices: [mac_mini_m4_24gb]
    model: "qwen3.5:14b"
    framework: open-webui
    repo: repo-open-webui
    use_cases: [local_rag_server, general_qa, writing_assistant]
    complexity: low
    always_on: true
    monthly_cost: "$0"
    note: >
      Good entry point for a private always-on knowledge server with document chat and lightweight RAG.
    setup_steps:
      - "ollama pull qwen3.5:14b"
      - "docker run -d -p 3000:8080 -e OLLAMA_BASE_URL=http://host.docker.internal:11434 ghcr.io/open-webui/open-webui:main"
      - "Open http://localhost:3000 and upload documents"

  - id: setup-n8n-scheduler
    label: "Automation Scheduler: Mac Mini 16GB + n8n + Ollama"
    devices: [mac_mini_16gb]
    model: "qwen3.5:9b"
    framework: n8n
    repo: repo-n8n
    use_cases: [schedule_task, file_automation, personal_assistant]
    complexity: medium
    always_on: true
    monthly_cost: "$0"
    note: >
      Best for recurring workflows, trigger-based automations, and lightweight assistant routines.
      Less agentic than OpenClaw, but easier to reason about for scheduled pipelines.
    setup_steps:
      - "ollama pull qwen3.5:9b"
      - "docker run -it --rm -p 5678:5678 -v ~/.n8n:/home/node/.n8n docker.n8n.io/n8nio/n8n"
      - "Create Ollama-backed workflow in n8n UI"

  - id: setup-macbook-portable-openclaw
    label: "Portable Agent Rig: MacBook Pro 32GB + OpenClaw"
    devices: [macbook_pro_32gb]
    model: "qwen3.5:35b-a3b"
    framework: openclaw
    repo: repo-openclaw
    use_cases: [browser_operator, web_automation, personal_assistant]
    complexity: medium
    always_on: false
    note: >
      Best portable option when you want strong browser automation and assistant workflows without a stationary server.
    setup_steps:
      - "ollama pull qwen3.5:35b-a3b"
      - "git clone https://github.com/openclaw/openclaw && cd openclaw"
      - "cp .env.example .env && set OLLAMA_HOST=http://localhost:11434"
      - "npm install && npm start"

  - id: setup-pc-browser-operator
    label: "Browser Operator Workstation: PC RTX 4060 Ti 16GB + OpenClaw"
    devices: [pc_rtx4060ti_16gb]
    model: "qwen3.5:14b"
    framework: openclaw
    repo: repo-openclaw
    use_cases: [browser_operator, web_automation, file_automation]
    complexity: medium
    always_on: true
    note: >
      Best value Windows/Linux workstation for interactive browser tasks, repetitive dashboard work, and file automation.
    setup_steps:
      - "ollama pull qwen3.5:14b"
      - "git clone https://github.com/openclaw/openclaw && cd openclaw"
      - "cp .env.example .env && set OLLAMA_HOST=http://localhost:11434"
      - "npm install && npm start"

  - id: setup-private-support-bot
    label: "Private Support Bot: Mac Mini M4 24GB + Dify"
    devices: [mac_mini_m4_24gb]
    model: "qwen3.5:14b"
    framework: dify
    repo: repo-dify
    use_cases: [customer_support_bot, local_rag_server, general_qa]
    complexity: low
    always_on: true
    monthly_cost: "$0"
    note: >
      Good self-hosted support bot stack for internal docs, FAQ, and lightweight workflow routing without heavy coding.
    setup_steps:
      - "ollama pull qwen3.5:14b"
      - "git clone https://github.com/langgenius/dify"
      - "cd dify/docker && cp .env.example .env && docker compose up -d"
      - "Open Dify UI and connect Ollama as the model provider"

  - id: setup-obsidian-rag-desk
    label: "Knowledge Desk: Mac Mini M4 32GB + Qwen-Agent"
    devices: [mac_mini_m4_32gb]
    model: "qwen3.5:35b-a3b"
    framework: qwen-agent
    repo: repo-qwen-agent
    use_cases: [obsidian_rag, obsidian_assistant, document_rag]
    complexity: medium
    always_on: true
    note: >
      Best for Obsidian-heavy knowledge workers who want retrieval, note grounding, and agentic query workflows in one box.
    setup_steps:
      - "ollama pull qwen3.5:35b-a3b"
      - "pip install qwen-agent"
      - "Connect vault/document tools and configure retrieval workflow"

  - id: setup-research-pipeline-pro
    label: "Research Pipeline Pro: Mac Studio M4 Max 64GB + Agno"
    devices: [mac_studio_m4_max_64gb]
    model: "qwen3.5:72b"
    framework: agno
    repo: repo-agno
    use_cases: [research_pipeline, deep_research, web_research]
    complexity: medium
    always_on: true
    note: >
      High-end local research workstation/server for repeated multi-step synthesis and long-form report generation.
    setup_steps:
      - "ollama pull qwen3.5:72b"
      - "pip install agno"
      - "Configure search and document tools for research workflows"

  - id: setup-email-calendar-hub
    label: "Inbox & Calendar Hub: Mac Mini 16GB + n8n"
    devices: [mac_mini_16gb]
    model: "qwen3.5:9b"
    framework: n8n
    repo: repo-n8n
    use_cases: [email_assistant, calendar_assistant, schedule_task]
    complexity: medium
    always_on: true
    monthly_cost: "$0"
    note: >
      Good always-on personal operations hub for inbox triage, reminders, and calendar-based automations.
    setup_steps:
      - "ollama pull qwen3.5:9b"
      - "docker run -it --rm -p 5678:5678 -v ~/.n8n:/home/node/.n8n docker.n8n.io/n8nio/n8n"
      - "Build email and calendar workflows in n8n"

  - id: setup-voice-meeting-desk
    label: "Voice & Meeting Desk: Mac Mini M4 24GB + faster-whisper + Open WebUI"
    devices: [mac_mini_m4_24gb]
    model: "qwen3.5:14b"
    framework: faster-whisper-stack
    repo: repo-faster-whisper
    use_cases: [voice_transcription_workbench, meeting_summarizer]
    complexity: medium
    always_on: false
    note: >
      Practical desk setup for local transcription, meeting cleanup, and follow-up summary generation.
    setup_steps:
      - "pip install faster-whisper"
      - "ollama pull qwen3.5:14b"
      - "Run local transcription pipeline, then summarize in Open WebUI or assistant workflow"

  - id: setup-home-dashboard-mini
    label: "Home Dashboard Mini: Mac Mini 16GB + OpenClaw"
    devices: [mac_mini_16gb]
    model: "qwen3.5:9b"
    framework: openclaw
    repo: repo-openclaw
    use_cases: [home_dashboard_agent, personal_assistant, schedule_task]
    complexity: medium
    always_on: true
    note: >
      Low-power always-on home or personal ops dashboard agent. Good for periodic checks, summaries, and alerts.
    setup_steps:
      - "ollama pull qwen3.5:9b"
      - "git clone https://github.com/openclaw/openclaw && cd openclaw"
      - "cp .env.example .env && set OLLAMA_HOST=http://localhost:11434"
      - "npm install && npm start"

  - id: setup-document-ingestion-lab
    label: "Document Ingestion Lab: PC RTX 4060 Ti 16GB + LlamaIndex"
    devices: [pc_rtx4060ti_16gb]
    model: "qwen3.5:14b"
    framework: llamaindex
    repo: repo-llamaindex
    use_cases: [document_ingestion_pipeline, document_rag, local_rag_server]
    complexity: medium
    always_on: false
    note: >
      Good workstation for indexing-heavy document pipelines and iterative retrieval experiments.
    setup_steps:
      - "ollama pull qwen3.5:14b"
      - "pip install llama-index llama-index-llms-ollama"
      - "Build ingestion/index pipeline and test retrieval quality"

  - id: setup-minipc-oculink-rtx3090
    label: "SFF eGPU Workstation: Mini PC + RTX 3090 24GB (OCuLink)"
    devices: [minipc_oculink_rtx3090_24gb]
    model: "qwen3.5:32b"
    framework: qwen-agent
    repo: repo-qwen-agent
    use_cases: all
    complexity: high
    always_on: true
    note: >
      Provides DGX-like VRAM capacity in a small form factor at half the cost.
      PCIe 4.0 x4 direct link ensures minimal performance loss compared to Thunderbolt.
      Ideal for large-scale data processing and complex research requiring 24GB VRAM.
    setup_steps:
      - "Connect RTX 3090 to Mini PC via OCuLink dock (e.g., DEG1)"
      - "Install Ubuntu 24.04 and NVIDIA Drivers"
      - "ollama pull qwen3.5:32b"
      - "pip install qwen-agent"
