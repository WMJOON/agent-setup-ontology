version: 0.1.0
instances:
  upgrade_paths:
    macbook:
    - from: macbook_air_8gb
      to: macbook_16gb
      reason: 16GB unlocks 9B models and most single-agent use cases.
    - from: macbook_16gb
      to: macbook_pro_32gb
      reason: 32GB unlocks MoE 35B-class models and multi-agent workflows.
    mac_mini:
    - from: mac_mini_16gb
      to: mac_mini_m4_32gb
      reason: Same form factor. 32GB unlocks 35b-a3b at ~$150 more.
    - from: mac_mini_m4_32gb
      to: mac_mini_pro_48gb
      reason: M4 Pro doubles bandwidth. 48GB unlocks 72B models.
    pc:
    - from: pc_no_gpu
      to: pc_rtx4060
      reason: RTX 4060 8GB (~$300) enables 9B model at 5-10x CPU speed.
    - from: pc_rtx4060
      to: pc_rtx4090
      reason: 24GB VRAM unlocks 32B dense models and LoRA fine-tuning.
  api_to_local_paths:
  - from_api: gpt-4o-mini
    quality: standard
    local_model: qwen3.5:9b
    min_device: mac_mini_16gb
    recommended_device: mac_mini_m4_32gb
    reason: 'mac_mini_16gb is the lowest-cost device that runs qwen3.5:9b comfortably.
      mac_mini_m4_32gb adds MoE 35b-a3b capability for ~$150 more.

      '
  - from_api: gemini-2-flash
    quality: standard
    local_model: qwen3.5:9b
    min_device: mac_mini_16gb
    recommended_device: mac_mini_m4_32gb
    reason: Same as gpt-4o-mini transition — standard quality tier.
  - from_api: claude-haiku-4-5
    quality: standard
    local_model: qwen3.5:9b
    min_device: mac_mini_16gb
    recommended_device: mac_mini_m4_32gb
    reason: Claude Haiku is standard tier. qwen3.5:9b is the local equivalent.
  - from_api: gpt-4o
    quality: pro
    local_model: qwen3.5:35b-a3b
    min_device: mac_mini_m4_32gb
    recommended_device: mac_mini_pro_48gb
    reason: 'qwen3.5:35b-a3b (MoE) matches GPT-4o quality at pro tier. mac_mini_m4_32gb
      runs it at ~20 t/s. mac_mini_pro_48gb (M4 Pro) adds 2x bandwidth for ~30 t/s.

      '
  - from_api: gemini-2-pro
    quality: pro
    local_model: qwen3.5:35b-a3b
    min_device: mac_mini_m4_32gb
    recommended_device: mac_mini_pro_48gb
    reason: Same as gpt-4o transition — pro quality tier.
  - from_api: claude-sonnet-4-6
    quality: pro
    local_model: qwen3.5:35b-a3b
    min_device: mac_mini_m4_32gb
    recommended_device: mac_mini_pro_48gb
    reason: 'Claude Sonnet is high pro tier. qwen3.5:35b-a3b is the closest open-weight
      equivalent. For users needing true Sonnet-level quality, qwen3.5:27b (dense)
      may be better.

      '
  framework_use_cases:
    smolagents:
      strong_fit:
      - use_case: web_automation
        reason: CodeAgent executes Python directly — best tool for dynamic browser
          tasks.
      - use_case: file_automation
        reason: Low boilerplate. Wrapping shell/file tools takes <10 lines.
      - use_case: web_research
        reason: DuckDuckGoSearchTool built-in. Works out of the box.
      - use_case: agent_monitoring
        reason: Code-execution approach makes logging and tracing straightforward.
      - use_case: schedule_task
        reason: Lightweight agent loop is easy to wrap in a cron job or scheduled
          runner.
      - use_case: deep_research
        reason: Multi-step search + code execution enables iterative research pipelines.
      weak_fit:
      - use_case: document_rag
        reason: No native RAG pipeline — use llamaindex or qwen-agent instead.
      - use_case: fine_tuning
        reason: Inference framework only. Use Unsloth or HuggingFace Trainer.
    qwen-agent:
      strong_fit:
      - use_case: document_rag
        reason: Native MCP + built-in document parsing. Best local RAG agent.
      - use_case: code_generation
        reason: Optimized for Qwen models which lead in coding benchmarks.
      - use_case: web_automation
        reason: Function calling and browser tools tightly integrated.
      - use_case: agent_monitoring
        reason: MCP protocol enables structured tool tracing.
      weak_fit:
      - use_case: multi_agent
        reason: Multi-agent support is limited vs crewai/langgraph.
    crewai:
      strong_fit:
      - use_case: multi_agent
        reason: Role-based Crew abstraction is the primary design target.
      - use_case: code_review
        reason: Reviewer + refactoring + documentation roles work well together.
      - use_case: web_research
        reason: Researcher + summarizer roles are a natural pattern.
      - use_case: deep_research
        reason: Researcher + analyst + writer crew pattern is ideal for long-form
          research.
      weak_fit:
      - use_case: web_automation
        reason: Requires standard-plus+ model for role coordination. Overhead for
          simple tasks.
      - use_case: local_copilot
        reason: Designed for multi-step pipelines, not IDE autocomplete.
      - use_case: schedule_task
        reason: Crew overhead not needed for simple scheduled tasks — use smolagents.
    langgraph:
      strong_fit:
      - use_case: multi_agent
        reason: Graph-based state machines are ideal for complex agent collaboration.
      - use_case: agent_monitoring
        reason: Full execution graph with checkpointing makes trace analysis precise.
      weak_fit:
      - use_case: file_automation
        reason: Steep learning curve — smolagents or qwen-agent is far simpler.
      - use_case: general_qa
        reason: Overkill. Use open-webui or anythingllm.
    openclaw:
      strong_fit:
      - use_case: web_automation
        reason: Primary use case. Browser + file + shell + messaging integration.
      - use_case: file_automation
        reason: Shell execution + file system access built-in.
      - use_case: personal_assistant
        reason: Messaging integrations + tool execution make it a natural always-on
          personal assistant.
      - use_case: obsidian_assistant
        reason: Strong file operations and automation fit note-centric knowledge base
          workflows.
      - use_case: browser_operator
        reason: Interactive browser control is one of OpenClaw's strongest practical
          patterns.
      weak_fit:
      - use_case: document_rag
        reason: Not a RAG framework. Use qwen-agent or llamaindex.
      - use_case: multi_agent
        reason: Single-agent design. Not built for multi-agent orchestration.
      - use_case: local_rag_server
        reason: Can orchestrate around RAG but is not the best primary serving layer
          for document chat.
    continue:
      strong_fit:
      - use_case: local_copilot
        reason: Purpose-built IDE plugin. Drop-in Copilot replacement.
      - use_case: code_generation
        reason: Tab autocomplete and slash commands in editor context.
      weak_fit:
      - use_case: web_automation
        reason: IDE-only tool. Cannot drive a browser.
      - use_case: document_rag
        reason: Limited to codebase indexing — not general document RAG.
    llamaindex:
      strong_fit:
      - use_case: document_rag
        reason: Production-grade RAG pipeline. Handles chunking, embedding, retrieval.
      - use_case: web_research
        reason: Web reader + retrieval tools make multi-source research feasible.
      weak_fit:
      - use_case: web_automation
        reason: Data retrieval framework, not a task automation tool.
      - use_case: local_copilot
        reason: Library, not an IDE extension.
    open-webui:
      strong_fit:
      - use_case: general_qa
        reason: Zero-code ChatGPT-like interface. Easiest to set up.
      - use_case: document_rag
        reason: Built-in document upload and RAG for non-technical users.
      - use_case: writing_assistant
        reason: Chat interface is ideal for iterative writing and editing workflows.
      weak_fit:
      - use_case: web_automation
        reason: UI only. Cannot trigger browser actions programmatically.
      - use_case: multi_agent
        reason: Single-user chat interface. Not designed for agent orchestration.
    autogen:
      strong_fit:
      - use_case: multi_agent
        reason: AssistantAgent + UserProxyAgent conversation pattern is the primary
          design target.
      - use_case: code_generation
        reason: Code execution with human-in-the-loop verification is a core AutoGen
          pattern.
      - use_case: code_review
        reason: Reviewer agent + Coder agent collaboration maps naturally to AutoGen
          roles.
      - use_case: agent_monitoring
        reason: Multi-agent conversation logs provide structured trace data for evaluation.
      - use_case: deep_research
        reason: Researcher + synthesizer + critic multi-agent loop handles complex
          research.
      weak_fit:
      - use_case: local_copilot
        reason: Not an IDE extension. Use Continue for inline autocomplete.
      - use_case: web_automation
        reason: No built-in browser control. Pair with Playwright/Selenium tools for
          web tasks.
      - use_case: schedule_task
        reason: Conversation overhead not needed for simple scheduled tasks.
    agno:
      strong_fit:
      - use_case: web_research
        reason: Built-in DuckDuckGo, newspaper, and YFinance tools. Working agent
          in <10 lines.
      - use_case: web_automation
        reason: Tool library includes browser and HTTP request tools.
      - use_case: document_rag
        reason: Built-in PDF and document reader tools. Easy RAG agent setup.
      - use_case: multi_agent
        reason: First-class Team abstraction for multi-agent collaboration.
      - use_case: deep_research
        reason: Multi-agent team (researcher + analyst + writer) is a natural Agno
          pattern.
      - use_case: general_qa
        reason: Lowest barrier to entry for a conversational agent with tool access.
      weak_fit:
      - use_case: fine_tuning
        reason: Inference framework only.
      - use_case: local_copilot
        reason: Not an IDE extension.
    openhands:
      strong_fit:
      - use_case: code_generation
        reason: Primary design target. Writes, runs, and debugs code in sandboxed
          environment.
      - use_case: code_review
        reason: Can read full codebases, run tests, and suggest fixes autonomously.
      - use_case: file_automation
        reason: Direct filesystem access in sandboxed environment. Strong at file
          manipulation.
      - use_case: web_automation
        reason: Built-in browser control for web research and form automation.
      weak_fit:
      - use_case: local_copilot
        reason: Task-by-task autonomous agent. Not designed for real-time IDE autocomplete.
      - use_case: multi_agent
        reason: Single-agent architecture. Not designed for multi-agent orchestration.
      - use_case: schedule_task
        reason: Docker overhead makes it impractical for lightweight scheduled tasks.
    haystack:
      strong_fit:
      - use_case: document_rag
        reason: Component-based Retriever → Reader → Ranker pipeline is production-tested.
      - use_case: web_research
        reason: WebSearch and URLFetcher components compose into research pipelines.
      - use_case: deep_research
        reason: Multi-hop retrieval pipelines handle complex multi-source research.
      weak_fit:
      - use_case: web_automation
        reason: Data pipeline framework. No browser or shell automation.
      - use_case: local_copilot
        reason: Pipeline library, not an IDE extension.
      - use_case: multi_agent
        reason: Not designed for agent orchestration. Use AutoGen or CrewAI instead.
    dify:
      strong_fit:
      - use_case: general_qa
        reason: Zero-code chatbot creation. Easiest non-technical self-hosted option.
      - use_case: document_rag
        reason: Built-in document ingestion, chunking, and retrieval — no coding required.
      - use_case: writing_assistant
        reason: Workflow builder makes iterative writing pipelines accessible without
          code.
      - use_case: web_research
        reason: Agentic workflows with web search tools available in visual builder.
      weak_fit:
      - use_case: code_generation
        reason: No IDE integration. Use Continue for inline code assistance.
      - use_case: multi_agent
        reason: Visual single-workflow builder. Not designed for multi-agent orchestration.
      - use_case: fine_tuning
        reason: Inference and app layer only. No training capability.
    anythingllm:
      strong_fit:
      - use_case: general_qa
        reason: Desktop app with persistent workspaces. Good non-technical user experience.
      - use_case: document_rag
        reason: Built-in document ingestion pipeline. No code required for RAG setup.
      - use_case: writing_assistant
        reason: Workspace-based organization suits iterative writing projects.
      - use_case: local_rag_server
        reason: Good private document-chat server for individuals and small teams.
      weak_fit:
      - use_case: web_automation
        reason: Desktop UI only. No programmatic browser or shell control.
      - use_case: multi_agent
        reason: Single-agent by design. Not suitable for orchestrated pipelines.
      - use_case: code_generation
        reason: No IDE integration. Use Continue for inline code assistance.
    n8n:
      strong_fit:
      - use_case: schedule_task
        reason: Native trigger/schedule model makes it ideal for cron-like automation.
      - use_case: file_automation
        reason: Integrations + workflow nodes handle routine file pipelines well.
      - use_case: personal_assistant
        reason: Good for event-driven assistant routines that stitch together apps
          and notifications.
      - use_case: email_assistant
        reason: Inbox-triggered workflows, drafts, and routing are a natural fit for
          n8n.
      - use_case: calendar_assistant
        reason: Calendar/event automations map well to trigger-and-action workflows.
      - use_case: home_dashboard_agent
        reason: Polling, alerts, and periodic summaries are exactly the kind of low-friction
          automation n8n handles well.
      weak_fit:
      - use_case: code_generation
        reason: Workflow tool, not a coding copilot.
      - use_case: multi_agent
        reason: Can orchestrate services, but not a true multi-agent reasoning framework.
      - use_case: browser_operator
        reason: Not intended for rich interactive browser control like OpenClaw or
          OpenHands.
    claude-code:
      strong_fit:
      - use_case: code_generation
        reason: Best-in-class interactive coding experience with repo awareness.
      - use_case: code_review
        reason: Excellent long-context diff and repository review workflow.
      - use_case: deep_research
        reason: Strong for codebase and documentation synthesis.
      weak_fit:
      - use_case: personal_assistant
        reason: IDE/terminal-centric tool, not an always-on messaging assistant.
      - use_case: schedule_task
        reason: Not intended as a background scheduler.
      - use_case: browser_operator
        reason: No native browser automation surface as a primary product focus.
    faster-whisper-stack:
      strong_fit:
      - use_case: voice_transcription_workbench
        reason: Fast local Whisper inference is the core primitive for transcription-heavy
          workflows.
      - use_case: meeting_summarizer
        reason: Reliable local transcripts make meeting summarization practical and
          private.
      weak_fit:
      - use_case: browser_operator
        reason: Audio/transcription layer, not a browser control framework.
      - use_case: schedule_task
        reason: Can be wrapped in automation, but not the scheduler layer itself.
  setup_profile_notes:
  - profile: setup-mac-mini-personal-assistant
    fit: strong
    use_case: personal_assistant
    reason: Always-on Mac Mini + OpenClaw is the cleanest private personal assistant
      shape in the current ontology.
  - profile: setup-mac-mini-personal-assistant
    fit: strong
    use_case: obsidian_assistant
    reason: Same box can operate as file-aware assistant for knowledge base maintenance.
  - profile: setup-mac-mini-rag-server
    fit: strong
    use_case: local_rag_server
    reason: Low-complexity always-on RAG server with good enough model quality at
      low operating cost.
  - profile: setup-n8n-scheduler
    fit: strong
    use_case: schedule_task
    reason: Trigger/schedule-first automation stack. Better than agent-first tools
      for repetitive jobs.
  - profile: setup-macbook-portable-openclaw
    fit: strong
    use_case: browser_operator
    reason: Best portable OpenClaw profile when an always-on server is not required.
  - profile: setup-pc-browser-operator
    fit: strong
    use_case: browser_operator
    reason: Good GPU-backed workstation for interactive browser control and repetitive
      dashboard work.
  - profile: setup-private-support-bot
    fit: strong
    use_case: customer_support_bot
    reason: Dify provides low-code support bot and document workflow UX that suits
      internal support stacks.
  - profile: setup-obsidian-rag-desk
    fit: strong
    use_case: obsidian_rag
    reason: Best fit when the primary corpus is an Obsidian vault and retrieval quality
      matters.
  - profile: setup-research-pipeline-pro
    fit: strong
    use_case: research_pipeline
    reason: Strong local research stack for repeated multi-step synthesis using a
      higher-end always-on box.
  - profile: setup-email-calendar-hub
    fit: strong
    use_case: email_assistant
    reason: n8n-based always-on hub is well suited for inbox triggers, drafts, and
      reminder workflows.
  - profile: setup-email-calendar-hub
    fit: strong
    use_case: calendar_assistant
    reason: Lightweight always-on automations fit schedule and reminder flows well.
  - profile: setup-voice-meeting-desk
    fit: strong
    use_case: voice_transcription_workbench
    reason: Transcription-first desk setup with a local summarization layer is the
      practical default shape.
  - profile: setup-voice-meeting-desk
    fit: strong
    use_case: meeting_summarizer
    reason: Meeting transcripts can be summarized and actionized efficiently on a
      single local desk setup.
  - profile: setup-home-dashboard-mini
    fit: strong
    use_case: home_dashboard_agent
    reason: Always-on low-power OpenClaw setup matches recurring dashboard checks
      and alerts.
  - profile: setup-document-ingestion-lab
    fit: strong
    use_case: document_ingestion_pipeline
    reason: GPU-backed workstation helps with repeated parsing, indexing, and retrieval
      iteration.
  use_case_adjacency:
  - from: web_automation
    to: browser_operator
    relation: specialization
    reason: Browser operator is a narrower, more interactive form of web automation.
  - from: document_rag
    to: local_rag_server
    relation: deployment_variant
    reason: local_rag_server is the serving-oriented always-on deployment form of
      document RAG.
  - from: obsidian_assistant
    to: obsidian_rag
    relation: capability_upgrade
    reason: Obsidian RAG extends note editing/management into retrieval-grounded question
      answering.
  - from: deep_research
    to: research_pipeline
    relation: operationalization
    reason: research_pipeline is the repeatable workflow form of deep research.
  - from: personal_assistant
    to: email_assistant
    relation: specialization
    reason: Email assistant is a narrower assistant form focused on inbox workflows.
  - from: personal_assistant
    to: calendar_assistant
    relation: specialization
    reason: Calendar assistant focuses on event/reminder workflows within the broader
      assistant space.
  - from: voice_assistant
    to: voice_transcription_workbench
    relation: supporting_pipeline
    reason: Transcription workbench is the offline/audio-processing support layer
      for many voice assistant flows.
  - from: document_rag
    to: document_ingestion_pipeline
    relation: upstream_pipeline
    reason: Good document RAG quality depends on disciplined ingestion, parsing, and
      indexing.
  - from: meeting_summarizer
    to: voice_transcription_workbench
    relation: prerequisite_pipeline
    reason: Meeting summarization often depends on reliable transcript generation
      first.
  model_use_case_notes:
  - model: deepseek-r1:8b
    use_case: agent_monitoring
    fit: strong
    reason: LLM-as-Judge tasks benefit from chain-of-thought. No real-time tool loop
      needed.
  - model: deepseek-r1:8b
    use_case: code_review
    fit: strong
    reason: Reasoning mode excels at multi-step diff analysis and bug detection.
  - model: deepseek-r1:8b
    use_case: web_automation
    fit: none
    reason: tool_calling=false. Cannot drive agent frameworks that rely on function
      calls.
  - model: deepseek-r1:32b
    use_case: agent_monitoring
    fit: strong
    reason: Best open-weight model for LLM-as-Judge at 32B. Offline batch evaluation.
  - model: deepseek-r1:32b
    use_case: web_automation
    fit: none
    reason: tool_calling=false. Not compatible with tool-calling agent loops.
  - model: gemma3:4b
    use_case: general_qa
    fit: strong
    reason: Excellent conversational quality for light tier despite no tool calling.
  - model: gemma3:12b
    use_case: document_rag
    fit: strong
    reason: Strong instruction following makes it reliable for RAG Q&A even without
      tool calls.
  - model: gemma3:27b
    use_case: document_rag
    fit: strong
    reason: Pro-tier quality for document understanding. No tool calling means frameworks
      must use text-in/text-out RAG.
  - model: gemma3:27b
    use_case: web_automation
    fit: none
    reason: tool_calling=false. Cannot reliably drive browser agent frameworks.
  - model: llama3.1:8b
    use_case: web_automation
    fit: standard
    reason: Reliable tool calling. Well-supported in LangChain/LangGraph ecosystem.
  - model: llama3.3:70b
    use_case: multi_agent
    fit: strong
    reason: Strong reasoning and tool calling at 70B. Good alternative to Qwen 72B.
  - model: llama3.2:3b
    use_case: local_copilot
    fit: strong
    reason: Fast enough for real-time autocomplete. Works in Continue IDE extension.
  - model: phi4:14b
    use_case: code_generation
    fit: strong
    reason: Microsoft Phi-4 outperforms many larger models on coding benchmarks at
      14B.
  - model: phi4:14b
    use_case: code_review
    fit: standard
    reason: Good code understanding but standard-plus quality may miss subtle architecture
      issues.
  - model: mistral:7b
    use_case: web_automation
    fit: standard
    reason: Solid function calling support. Well-tested with LangChain tool ecosystems.
  - model: mistral:7b
    use_case: local_copilot
    fit: standard
    reason: Fast 7B model. Compatible with Continue IDE extension via Ollama.
  - model: gemma3:12b
    use_case: writing_assistant
    fit: strong
    reason: Strong instruction following and language quality. No tool calling needed
      for writing.
  - model: gemma3:27b
    use_case: writing_assistant
    fit: strong
    reason: Pro-tier language quality without needing function calls.
  - model: phi4:14b
    use_case: writing_assistant
    fit: strong
    reason: Phi-4 excels at text quality, style, and clarity improvements.
  - model: deepseek-r1:8b
    use_case: deep_research
    fit: standard
    reason: Chain-of-thought helps with multi-step synthesis but 8B size limits coverage.
  - model: deepseek-r1:32b
    use_case: deep_research
    fit: strong
    reason: Best open-weight reasoning model for long-form multi-source research synthesis.
  - model: llama3.3:70b
    use_case: deep_research
    fit: strong
    reason: Strong instruction following at 70B handles complex research pipelines.
  - model: llama3.2:3b
    use_case: schedule_task
