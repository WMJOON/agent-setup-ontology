  device_model_fit:
  - device: macbook_air_8gb
    model: llama3.2:3b
    fit: good
    reason: 3B fits easily. Fast and usable for local_copilot and simple Q&A.
  - device: macbook_air_8gb
    model: qwen3.5:4b
    fit: good
    reason: 4B sweet spot for 8GB. Reliable tool calling on minimal hardware.
  - device: macbook_air_8gb
    model: gemma3:4b
    fit: good
    reason: Good language quality within 8GB. No tool calling is fine for general_qa.
  - device: macbook_air_8gb
    model: qwen3.5:9b
    fit: marginal
    reason: '9B technically fits (8GB model + 8GB device is tight). May swap under
      system load. Throttling risk on sustained inference. Not recommended for production
      agent use on 8GB.

      '
  - device: macbook_16gb
    model: qwen3.5:9b
    fit: excellent
    reason: Primary recommendation. 20-35 t/s. Best daily-driver on 16GB Apple Silicon.
  - device: macbook_16gb
    model: mistral:7b
    fit: good
    reason: Good alternative to qwen3.5:9b. Strong LangChain ecosystem fit.
  - device: macbook_16gb
    model: llama3.1:8b
    fit: good
    reason: Reliable tool calling. Fits comfortably in 16GB with room for context.
  - device: macbook_16gb
    model: gemma3:12b
    fit: good
    reason: 12B fits in 16GB. Good for writing and RAG without needing tool calls.
  - device: macbook_16gb
    model: phi4:14b
    fit: marginal
    reason: '14B on 16GB is tight. Works but leaves little room for context. Recommend
      32GB+ for phi4:14b in production agent use.

      '
  - device: mac_mini_m4_32gb
    model: qwen3.5:35b-a3b
    fit: excellent
    reason: The defining pairing. MoE activates 3B, achieving 27B quality at 18-25
      t/s.
  - device: mac_mini_m4_32gb
    model: deepseek-r1:8b
    fit: good
    reason: 32GB has plenty of headroom. Good for offline reasoning jobs on always-on
      server.
  - device: mac_mini_m4_32gb
    model: gemma3:27b
    fit: good
    reason: 27B fits in 32GB. Slower than MoE but excellent for writing/RAG workloads.
  - device: mac_mini_m4_32gb
    model: qwen3.5:27b
    fit: good
    reason: Dense 27B fits but runs slower than 35b-a3b MoE (~10-15 t/s vs ~20 t/s).
  - device: mac_mini_pro_48gb
    model: llama3.3:70b
    fit: good
    reason: 70B requires 64GB minimum — fits on 48GB only with aggressive quantization
      (Q2/Q3). Verify before relying on this.
  - device: mac_mini_pro_48gb
    model: deepseek-r1:32b
    fit: excellent
    reason: 32B fits with ample headroom. M4 Pro bandwidth enables good throughput.
  - device: pc_rtx4060
    model: mistral:7b
    fit: excellent
    reason: 7B fits entirely in 8GB VRAM. CUDA + Mistral is a popular Windows stack.
  - device: pc_rtx4060
    model: llama3.1:8b
    fit: good
    reason: 8B fits in 8GB VRAM. Standard Windows/Linux CUDA inference.
  - device: pc_rtx4060
    model: qwen3.5:9b
    fit: marginal
    reason: '9B slightly exceeds 8GB VRAM. Some layers spill to CPU RAM. Results in
      mixed CUDA/CPU inference — slower but functional.

      '
  - device: pc_rtx4090
    model: qwen3.5:27b
    fit: excellent
    reason: 27B fits in 24GB VRAM entirely. ~40-50 t/s. Best CUDA dense model pairing.
  - device: pc_rtx4090
    model: deepseek-r1:32b
    fit: marginal
    reason: '32B exceeds 24GB VRAM. Partial CPU offload required. Still functional
      for batch reasoning but not optimal.

      '
