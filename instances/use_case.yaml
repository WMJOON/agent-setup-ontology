  - id: research_pipeline
    label: "리서치 파이프라인"
    description: "검색, 읽기, 정리, 비교, 초안 작성이 이어지는 반복형 조사 워크플로우"
    keywords: [리서치파이프라인, 조사파이프라인, 검색정리, 보고서초안,
