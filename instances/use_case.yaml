    min_memory_gb: 32
    needs_always_on: false
    recommended_models: [qwen3.5:27b, qwen3.5:35b-a3b, deepseek-r1:32b, llama3.3:70b]
    recommended_frameworks: [smolagents, langgraph]

  - id: fine_tuning
    label: "파인튜닝·LoRA"
    description: "로컬 모델 커스터마이징"
    keywords: [파인튜닝, LoRA, QLoRA, 학습, 훈련,
               fine-tuning, lora, qlora, training, finetune, custom, adapter]
    min_memory_gb: 32
    requires_gpu: true
    recommended_models: [qwen3.5:9b, qwen3.5:14b, llama3.1:8b, mistral:7b]
    recommended_frameworks: []

  - id: deep_research
    label: "딥 리서치"
    description: "멀티스텝 리서치, 출처 종합, 장문 보고서 작성"
    keywords: [딥리서치, 리포트, 분석, 조사, 출처, 종합,
               deep research, multi-step, report, long-form, synthesis, sources, survey]
    min_memory_gb: 32
    needs_always_on: false
    recommended_models: [qwen3.5:27b, qwen3.5:35b-a3b, llama3.3:70b, deepseek-r1:32b]
    recommended_frameworks: [crewai, llamaindex, smolagents]
    note: >
      Requires multiple sequential tool calls (search → read → summarize → synthesize).
      Standard-plus or pro tier model strongly recommended for coherent long-form output.

  - id: writing_assistant
    label: "글쓰기·문서 작성"
    description: "초안 작성, 교정, 번역, 스타일 개선"
    keywords: [글쓰기, 작성, 교정, 번역, 스타일, 에세이, 문서,
               writing, draft, proofread, translate, style, essay, document, editing]
    min_memory_gb: 8
    needs_always_on: false
    recommended_models: [qwen3.5:9b, qwen3.5:14b, gemma3:12b, gemma3:27b, phi4:14b]
    recommended_frameworks: [open-webui, anythingllm]
    note: >
      tool_calling not required. Gemma models are strong here despite no function calling.
      Chat UI (open-webui, anythingllm) is sufficient — no agent framework needed.

  - id: schedule_task
    label: "예약·자동 실행"
    description: "정해진 시간에 작업 자동 실행 (크론, 배치)"
    keywords: [예약, 자동실행, 크론, 배치, 스케줄, 반복,
               schedule, cron, batch, recurring, automatic, timed, periodic]
    min_memory_gb: 8
    needs_always_on: true
    recommended_models: [qwen3.5:4b, qwen3.5:9b, llama3.2:3b]
    recommended_frameworks: [smolagents, openclaw]
    note: >
      Requires the device to be always-on (mac-mini, stationary PC preferred).
      Light models are sufficient for most scheduled tasks — speed matters less than availability.

  - id: personal_assistant
    label: "개인 비서·메시징 에이전트"
    description: "텔레그램/슬랙/시그널 같은 채널에서 대화하고 개인 작업을 수행하는 에이전트"
    keywords: [개인비서, 비서, 텔레그램, 슬랙, 시그널, 메시지, 메신저,
               personal assistant, messaging agent, telegram, slack, signal, whatsapp, chat ops]
    min_memory_gb: 16
    needs_always_on: true
    recommended_models: [qwen3.5:9b, qwen3.5:35b-a3b, granite3.1-dense:8b, llama3.1:8b]
    recommended_frameworks: [openclaw, smolagents]
    note: >
      Best served by an always-on device with messaging integrations and safe tool execution.
      OpenClaw-style assistants are the canonical fit.

  - id: obsidian_assistant
    label: "Obsidian 지식 베이스 보조"
    description: "Obsidian vault 검색, 노트 생성/편집, 지식 베이스 정리"
    keywords: [obsidian, 볼트, 노트, 지식베이스, 위키링크, 메모,
               obsidian assistant, vault, notes, knowledge base, wikilink, markdown]
    min_memory_gb: 16
    needs_always_on: false
    recommended_models: [qwen3.5:9b, qwen3.5:14b, gemma3:12b]
    recommended_frameworks: [openclaw, qwen-agent, anythingllm]
    note: >
      Requires strong file handling and long-context summarization.
      Good fit for personal knowledge management and note-centric workflows.

  - id: local_rag_server
    label: "로컬 RAG 서버"
    description: "문서 업로드, 질의응답, 팀/개인용 지식 검색 서버"
    keywords: [로컬 rag, rag 서버, 문서서버, 업로드, 검색,
               local rag, rag server, knowledge server, document chat, retrieval server]
    min_memory_gb: 16
    needs_always_on: true
    recommended_models: [qwen3.5:14b, mistral-small, qwen3-embedding:8b, embeddinggemma, gemma3:12b]
    recommended_frameworks: [llamaindex, haystack, open-webui, dify, anythingllm]
    note: >
      Prioritizes stable serving, document ingestion, and retrieval quality over agentic autonomy.

  - id: browser_operator
    label: "브라우저 오퍼레이터"
    description: "로그인 이후 반복 클릭, 폼 작성, 페이지 탐색 같은 실사용 브라우저 작업"
    keywords: [브라우저 오퍼레이터, 페이지 조작, 클릭, 폼작성, 로그인 자동화,
               browser operator, browser control, page interaction, click, form filling, navigate]
    min_memory_gb: 16
    needs_always_on: false
    recommended_models: [qwen3.5:9b, qwen3.5:35b-a3b, mistral:7b]
    recommended_frameworks: [openclaw, openhands, smolagents]
    note: >
      Similar to web_automation but centered on interactive browser control rather than scraping alone.

  - id: voice_assistant
    label: "음성 비서"
