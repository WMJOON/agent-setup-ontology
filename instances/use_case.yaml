    min_memory_gb: 16
    needs_always_on: false
    recommended_models: [qwen3.5:14b, mistral-small, qwen3-embedding:8b, gemma3:12b, gemma3:27b]
    recommended_frameworks: [qwen-agent, llamaindex]

  - id: general_qa
    label: "일반 Q&A 챗봇"
    description: "ChatGPT 대체 로컬 대화 AI"
    keywords: [챗봇, 질문, 대화, ChatGPT, 대체, 비서,
               chat, question, answer, conversation, assistant, chatgpt, local]
    min_memory_gb: 8
    needs_always_on: false
    recommended_models: [qwen3.5:9b, llama3.1:8b, mistral-small, gemma3:12b, granite3.1-dense:8b]
