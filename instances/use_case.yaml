    note: >
      Distinct from one-shot deep research: optimized for repeatable, semi-structured research workflows.

  - id: obsidian_rag
    label: "Obsidian RAG"
    description: "Obsidian vault를 검색·연결·요약하는 지식 베이스 질의응답"
