               search, research, trend, news, summarize, analysis]
    min_memory_gb: 16
    needs_always_on: false
    recommended_models: [qwen3.5:9b, qwen3.5:14b, llama3.1:8b, mistral:7b]
    recommended_frameworks: [smolagents, qwen-agent]

  - id: document_rag
    label: "문서 RAG"
    description: "PDF·문서 기반 질문 응답"
    keywords: [PDF, 문서, RAG, 질문, 요약, 파일,
