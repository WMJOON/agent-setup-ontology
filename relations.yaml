# agent-setup-ontology — Relation Definitions
# v0.1.0: expanded with explicit instance data.
#
# Structure:
#   categories             — relation type taxonomy (범주 정의)
#   relation_types         — formal relation type definitions with derivation rules
#   instances              — explicit relation instances that cannot be auto-derived
#     upgrade_paths          — device → device upgrade path
#     api_to_local_paths     — api_service → device transition recommendation
#     framework_use_cases    — curated framework → use case suitability (non-derivable nuances)
#     model_use_case_notes   — model → use case fit notes (special cases beyond quality derivation)
version: "0.1.0"

# ──────────────────────────────────────────────────────────
# Relation Category Taxonomy (범주)
# ──────────────────────────────────────────────────────────
categories:

  compatibility:
    label: "Compatibility"
    description: >
      Can X work with Y?
      Whether two entities can be used together in a stack.
      Example: device can run model, framework supports runtime.

  equivalence:
    label: "Equivalence"
    description: >
      X and Y provide comparable capability.
      Used to map between cloud API and local model quality.
      Does not imply identical output — indicates same quality tier.

  transition:
    label: "Transition"
    description: >
      When and how to move from X to Y.
      Covers both device upgrades and API-to-local migration.
      The primary relation category for cost-based recommendations.

  capability:
    label: "Capability"
    description: >
      X is capable of handling Y.
      Whether a model or device has sufficient quality/resources
      to support a given use case at practical speeds.

  requirement:
    label: "Requirement"
    description: >
      Y needs X to function at a useful level.
      Minimum tier or resource required by a use case.

  recommendation:
    label: "Recommendation"
    description: >
      X is well-suited for Y.
      Preferred pairing, not a hard constraint.
      The copilot prioritizes recommendation relations when multiple
      compatible options exist.

# ──────────────────────────────────────────────────────────
# Relation Type Definitions
# ──────────────────────────────────────────────────────────
relation_types:

  # ── Compatibility ──────────────────────────────────────

  - id: device_runs_model
    label: "Device — runs → Model"
    category: compatibility
    source: device
    target: model
    inverse: model_runs_on_device
    derivation: >
      device.memory_gb >= model.min_memory_gb
      For PC with discrete GPU: device.gpu_vram_gb >= model's VRAM requirement
    note: >
      Fully derivable from data.
      The copilot computes this at query time — no explicit instances needed.

  - id: framework_uses_runtime
    label: "Framework — uses → Runtime"
    category: compatibility
    source: framework
    target: runtime  # values: ollama | openai | anthropic | ...
    field: "framework.runtime_support[]"
    note: "Stored explicitly in framework.runtime_support[]."

  # ── Equivalence ─────────────────────────────────────────

  - id: api_equivalent_local
    label: "API Service — equivalent_to → Model"
    category: equivalence
    source: api_service
    target: model
    field: "api_service.local_alternative"
    basis: >
      Same quality tier (light/standard/standard-plus/pro).
      Comparable tool_calling reliability and instruction-following
      for typical agent tasks. Does not guarantee identical outputs.
    note: "Stored explicitly in api_service.local_alternative field."

  # ── Transition ──────────────────────────────────────────

  - id: api_transitions_to_device
    label: "API Service — transitions_to → Device"
    category: transition
    source: api_service
    target: device
    trigger: >
      monthly_api_cost > device.price / 24
      (monthly API spend exceeds 2-year amortized device cost)
    derivation: >
      1. api_service.local_alternative → model_id
      2. Find devices where memory_gb >= model.min_memory_gb
      3. Filter by lowest price among qualifying devices
      4. Prefer same OS/platform as user's current setup
    note: >
      Computed at query time using cost_estimation formulas in concepts.yaml.
      Explicit instances provided below for the most common paths.

  - id: device_upgrades_to
    label: "Device — upgrades_to → Device"
    category: transition
    source: device
    target: device
    derivation: >
      Follow tier ordering: light → standard → standard-plus → pro
      Prefer same form_factor (mac-mini → mac-mini, pc → pc).
      Skip tiers if use case requirements jump significantly.
    note: "Explicit upgrade_paths instances provided below."

  # ── Capability ──────────────────────────────────────────

  - id: model_enables_use_case
    label: "Model — enables → Use Case"
    category: capability
    source: model
    target: use_case
    derivation: >
      model.quality >= use_case's minimum quality requirement
      AND model.tool_calling = true  (for agent/automation use cases)
    note: "Derivable. Use concepts.yaml quality descriptions to map quality → use_case."

  - id: device_supports_use_case
    label: "Device — supports → Use Case"
    category: capability
    source: device
    target: use_case
    derivation: >
      device.memory_gb >= use_case.min_memory_gb
      AND (NOT use_case.requires_gpu OR device.gpu_vram_gb > 0)
      AND (NOT use_case.needs_always_on OR device.always_on = true)
    note: "Derivable. Combines device specs with use_case requirements."

  # ── Requirement ─────────────────────────────────────────

  - id: use_case_requires_tier
    label: "Use Case — requires → Device Tier"
    category: requirement
    source: use_case
    target: device_tier  # light | standard | standard-plus | pro
    derivation: >
      min_memory_gb < 16  → light (or higher)
      min_memory_gb = 16  → standard (or higher)
      min_memory_gb = 32  → standard-plus or pro
      requires_gpu = true → must have gpu_vram_gb > 0
    note: "Derivable from use_case.min_memory_gb and requires_gpu."

  # ── Recommendation ──────────────────────────────────────

  - id: framework_suits_use_case
    label: "Framework — suits → Use Case"
    category: recommendation
    source: framework
    target: use_case
    field: "framework.best_for[]"
    note: "Stored explicitly in framework.best_for[]."

  - id: model_sweet_spot_for_tier
    label: "Model — sweet_spot_for → Device Tier"
    category: recommendation
    source: model
    target: device_tier
    field: "model.sweet_spot"
    note: >
      When sweet_spot=true, this model is the first recommendation
      for devices of the matching tier. Copilot ranks sweet_spot
      models above others with equal quality.

# ──────────────────────────────────────────────────────────
# Instances — Explicit Relation Data
# (only where derivation rules are insufficient)
# ──────────────────────────────────────────────────────────
instances:

  # ── Device Upgrade Paths ────────────────────────────────
  # relation: device_upgrades_to
  # rationale: form_factor preference makes this non-trivially derivable

  upgrade_paths:

    macbook:
      - from: macbook_air_8gb
        to: macbook_16gb
        reason: "16GB unlocks 9B models and most single-agent use cases."
      - from: macbook_16gb
        to: macbook_pro_32gb
        reason: "32GB unlocks MoE 35B-class models and multi-agent workflows."

    mac_mini:
      - from: mac_mini_16gb
        to: mac_mini_m4_32gb
        reason: "Same form factor. 32GB unlocks 35b-a3b at ~$150 more."
      - from: mac_mini_m4_32gb
        to: mac_mini_pro_48gb
        reason: "M4 Pro doubles bandwidth. 48GB unlocks 72B models."

    pc:
      - from: pc_no_gpu
        to: pc_rtx4060
        reason: "RTX 4060 8GB (~$300) enables 9B model at 5-10x CPU speed."
      - from: pc_rtx4060
        to: pc_rtx4090
        reason: "24GB VRAM unlocks 32B dense models and LoRA fine-tuning."

  # ── API → Local Transition Paths ───────────────────────
  # relation: api_transitions_to_device
  # rationale: includes platform preference and form_factor hints

  api_to_local_paths:

    # Standard quality tier transitions
    - from_api: gpt-4o-mini
      quality: standard
      local_model: "qwen3.5:9b"
      min_device: mac_mini_16gb
      recommended_device: mac_mini_m4_32gb
      reason: >
        mac_mini_16gb is the lowest-cost device that runs qwen3.5:9b comfortably.
        mac_mini_m4_32gb adds MoE 35b-a3b capability for ~$150 more.

    - from_api: gemini-2-flash
      quality: standard
      local_model: "qwen3.5:9b"
      min_device: mac_mini_16gb
      recommended_device: mac_mini_m4_32gb
      reason: "Same as gpt-4o-mini transition — standard quality tier."

    - from_api: claude-haiku-4-5
      quality: standard
      local_model: "qwen3.5:9b"
      min_device: mac_mini_16gb
      recommended_device: mac_mini_m4_32gb
      reason: "Claude Haiku is standard tier. qwen3.5:9b is the local equivalent."

    # Pro quality tier transitions
    - from_api: gpt-4o
      quality: pro
      local_model: "qwen3.5:35b-a3b"
      min_device: mac_mini_m4_32gb
      recommended_device: mac_mini_pro_48gb
      reason: >
        qwen3.5:35b-a3b (MoE) matches GPT-4o quality at pro tier.
        mac_mini_m4_32gb runs it at ~20 t/s.
        mac_mini_pro_48gb (M4 Pro) adds 2x bandwidth for ~30 t/s.

    - from_api: gemini-2-pro
      quality: pro
      local_model: "qwen3.5:35b-a3b"
      min_device: mac_mini_m4_32gb
      recommended_device: mac_mini_pro_48gb
      reason: "Same as gpt-4o transition — pro quality tier."

    - from_api: claude-sonnet-4-6
      quality: pro
      local_model: "qwen3.5:35b-a3b"
      min_device: mac_mini_m4_32gb
      recommended_device: mac_mini_pro_48gb
      reason: >
        Claude Sonnet is high pro tier.
        qwen3.5:35b-a3b is the closest open-weight equivalent.
        For users needing true Sonnet-level quality, qwen3.5:27b (dense) may be better.

  # ── Framework → Use Case Suitability ───────────────────
  # relation: framework_suits_use_case
  # rationale: nuanced suitability beyond what best_for[] captures;
  #   includes explicit "not recommended" notes and cross-framework comparisons.

  framework_use_cases:

    smolagents:
      strong_fit:
        - use_case: web_automation
          reason: "CodeAgent executes Python directly — best tool for dynamic browser tasks."
        - use_case: file_automation
          reason: "Low boilerplate. Wrapping shell/file tools takes <10 lines."
        - use_case: web_research
          reason: "DuckDuckGoSearchTool built-in. Works out of the box."
        - use_case: agent_monitoring
          reason: "Code-execution approach makes logging and tracing straightforward."
        - use_case: schedule_task
          reason: "Lightweight agent loop is easy to wrap in a cron job or scheduled runner."
        - use_case: deep_research
          reason: "Multi-step search + code execution enables iterative research pipelines."
      weak_fit:
        - use_case: document_rag
          reason: "No native RAG pipeline — use llamaindex or qwen-agent instead."
        - use_case: fine_tuning
          reason: "Inference framework only. Use Unsloth or HuggingFace Trainer."

    qwen-agent:
      strong_fit:
        - use_case: document_rag
          reason: "Native MCP + built-in document parsing. Best local RAG agent."
        - use_case: code_generation
          reason: "Optimized for Qwen models which lead in coding benchmarks."
        - use_case: web_automation
          reason: "Function calling and browser tools tightly integrated."
        - use_case: agent_monitoring
          reason: "MCP protocol enables structured tool tracing."
      weak_fit:
        - use_case: multi_agent
          reason: "Multi-agent support is limited vs crewai/langgraph."

    crewai:
      strong_fit:
        - use_case: multi_agent
          reason: "Role-based Crew abstraction is the primary design target."
        - use_case: code_review
          reason: "Reviewer + refactoring + documentation roles work well together."
        - use_case: web_research
          reason: "Researcher + summarizer roles are a natural pattern."
        - use_case: deep_research
          reason: "Researcher + analyst + writer crew pattern is ideal for long-form research."
      weak_fit:
        - use_case: web_automation
          reason: "Requires standard-plus+ model for role coordination. Overhead for simple tasks."
        - use_case: local_copilot
          reason: "Designed for multi-step pipelines, not IDE autocomplete."
        - use_case: schedule_task
          reason: "Crew overhead not needed for simple scheduled tasks — use smolagents."

    langgraph:
      strong_fit:
        - use_case: multi_agent
          reason: "Graph-based state machines are ideal for complex agent collaboration."
        - use_case: agent_monitoring
          reason: "Full execution graph with checkpointing makes trace analysis precise."
      weak_fit:
        - use_case: file_automation
          reason: "Steep learning curve — smolagents or qwen-agent is far simpler."
        - use_case: general_qa
          reason: "Overkill. Use open-webui or anythingllm."

    openclaw:
      strong_fit:
        - use_case: web_automation
          reason: "Primary use case. Browser + file + shell + messaging integration."
        - use_case: file_automation
          reason: "Shell execution + file system access built-in."
      weak_fit:
        - use_case: document_rag
          reason: "Not a RAG framework. Use qwen-agent or llamaindex."
        - use_case: multi_agent
          reason: "Single-agent design. Not built for multi-agent orchestration."

    continue:
      strong_fit:
        - use_case: local_copilot
          reason: "Purpose-built IDE plugin. Drop-in Copilot replacement."
        - use_case: code_generation
          reason: "Tab autocomplete and slash commands in editor context."
      weak_fit:
        - use_case: web_automation
          reason: "IDE-only tool. Cannot drive a browser."
        - use_case: document_rag
          reason: "Limited to codebase indexing — not general document RAG."

    llamaindex:
      strong_fit:
        - use_case: document_rag
          reason: "Production-grade RAG pipeline. Handles chunking, embedding, retrieval."
        - use_case: web_research
          reason: "Web reader + retrieval tools make multi-source research feasible."
      weak_fit:
        - use_case: web_automation
          reason: "Data retrieval framework, not a task automation tool."
        - use_case: local_copilot
          reason: "Library, not an IDE extension."

    open-webui:
      strong_fit:
        - use_case: general_qa
          reason: "Zero-code ChatGPT-like interface. Easiest to set up."
        - use_case: document_rag
          reason: "Built-in document upload and RAG for non-technical users."
        - use_case: writing_assistant
          reason: "Chat interface is ideal for iterative writing and editing workflows."
      weak_fit:
        - use_case: web_automation
          reason: "UI only. Cannot trigger browser actions programmatically."
        - use_case: multi_agent
          reason: "Single-user chat interface. Not designed for agent orchestration."

    autogen:
      strong_fit:
        - use_case: multi_agent
          reason: "AssistantAgent + UserProxyAgent conversation pattern is the primary design target."
        - use_case: code_generation
          reason: "Code execution with human-in-the-loop verification is a core AutoGen pattern."
        - use_case: code_review
          reason: "Reviewer agent + Coder agent collaboration maps naturally to AutoGen roles."
        - use_case: agent_monitoring
          reason: "Multi-agent conversation logs provide structured trace data for evaluation."
        - use_case: deep_research
          reason: "Researcher + synthesizer + critic multi-agent loop handles complex research."
      weak_fit:
        - use_case: local_copilot
          reason: "Not an IDE extension. Use Continue for inline autocomplete."
        - use_case: web_automation
          reason: "No built-in browser control. Pair with Playwright/Selenium tools for web tasks."
        - use_case: schedule_task
          reason: "Conversation overhead not needed for simple scheduled tasks."

    agno:
      strong_fit:
        - use_case: web_research
          reason: "Built-in DuckDuckGo, newspaper, and YFinance tools. Working agent in <10 lines."
        - use_case: web_automation
          reason: "Tool library includes browser and HTTP request tools."
        - use_case: document_rag
          reason: "Built-in PDF and document reader tools. Easy RAG agent setup."
        - use_case: multi_agent
          reason: "First-class Team abstraction for multi-agent collaboration."
        - use_case: deep_research
          reason: "Multi-agent team (researcher + analyst + writer) is a natural Agno pattern."
        - use_case: general_qa
          reason: "Lowest barrier to entry for a conversational agent with tool access."
      weak_fit:
        - use_case: fine_tuning
          reason: "Inference framework only."
        - use_case: local_copilot
          reason: "Not an IDE extension."

    openhands:
      strong_fit:
        - use_case: code_generation
          reason: "Primary design target. Writes, runs, and debugs code in sandboxed environment."
        - use_case: code_review
          reason: "Can read full codebases, run tests, and suggest fixes autonomously."
        - use_case: file_automation
          reason: "Direct filesystem access in sandboxed environment. Strong at file manipulation."
        - use_case: web_automation
          reason: "Built-in browser control for web research and form automation."
      weak_fit:
        - use_case: local_copilot
          reason: "Task-by-task autonomous agent. Not designed for real-time IDE autocomplete."
        - use_case: multi_agent
          reason: "Single-agent architecture. Not designed for multi-agent orchestration."
        - use_case: schedule_task
          reason: "Docker overhead makes it impractical for lightweight scheduled tasks."

    haystack:
      strong_fit:
        - use_case: document_rag
          reason: "Component-based Retriever → Reader → Ranker pipeline is production-tested."
        - use_case: web_research
          reason: "WebSearch and URLFetcher components compose into research pipelines."
        - use_case: deep_research
          reason: "Multi-hop retrieval pipelines handle complex multi-source research."
      weak_fit:
        - use_case: web_automation
          reason: "Data pipeline framework. No browser or shell automation."
        - use_case: local_copilot
          reason: "Pipeline library, not an IDE extension."
        - use_case: multi_agent
          reason: "Not designed for agent orchestration. Use AutoGen or CrewAI instead."

    dify:
      strong_fit:
        - use_case: general_qa
          reason: "Zero-code chatbot creation. Easiest non-technical self-hosted option."
        - use_case: document_rag
          reason: "Built-in document ingestion, chunking, and retrieval — no coding required."
        - use_case: writing_assistant
          reason: "Workflow builder makes iterative writing pipelines accessible without code."
        - use_case: web_research
          reason: "Agentic workflows with web search tools available in visual builder."
      weak_fit:
        - use_case: code_generation
          reason: "No IDE integration. Use Continue for inline code assistance."
        - use_case: multi_agent
          reason: "Visual single-workflow builder. Not designed for multi-agent orchestration."
        - use_case: fine_tuning
          reason: "Inference and app layer only. No training capability."

    anythingllm:
      strong_fit:
        - use_case: general_qa
          reason: "Desktop app with persistent workspaces. Good non-technical user experience."
        - use_case: document_rag
          reason: "Built-in document ingestion pipeline. No code required for RAG setup."
        - use_case: writing_assistant
          reason: "Workspace-based organization suits iterative writing projects."
      weak_fit:
        - use_case: web_automation
          reason: "Desktop UI only. No programmatic browser or shell control."
        - use_case: multi_agent
          reason: "Single-agent by design. Not suitable for orchestrated pipelines."
        - use_case: code_generation
          reason: "No IDE integration. Use Continue for inline code assistance."

  # ── Model → Use Case Notes ──────────────────────────────
  # relation: model_enables_use_case (special cases / cross-family notes)
  # rationale: derivation rules cover quality-based filtering,
  #   but tool_calling=false, reasoning overhead, and ecosystem fit
  #   require explicit curation for accurate recommendations.

  model_use_case_notes:

    # Reasoning models — batch evaluation only
    - model: deepseek-r1:8b
      use_case: agent_monitoring
      fit: strong
      reason: "LLM-as-Judge tasks benefit from chain-of-thought. No real-time tool loop needed."
    - model: deepseek-r1:8b
      use_case: code_review
      fit: strong
      reason: "Reasoning mode excels at multi-step diff analysis and bug detection."
    - model: deepseek-r1:8b
      use_case: web_automation
      fit: none
      reason: "tool_calling=false. Cannot drive agent frameworks that rely on function calls."
    - model: deepseek-r1:32b
      use_case: agent_monitoring
      fit: strong
      reason: "Best open-weight model for LLM-as-Judge at 32B. Offline batch evaluation."
    - model: deepseek-r1:32b
      use_case: web_automation
      fit: none
      reason: "tool_calling=false. Not compatible with tool-calling agent loops."

    # Gemma — no tool calling
    - model: gemma3:4b
      use_case: general_qa
      fit: strong
      reason: "Excellent conversational quality for light tier despite no tool calling."
    - model: gemma3:12b
      use_case: document_rag
      fit: strong
      reason: "Strong instruction following makes it reliable for RAG Q&A even without tool calls."
    - model: gemma3:27b
      use_case: document_rag
      fit: strong
      reason: "Pro-tier quality for document understanding. No tool calling means frameworks must use text-in/text-out RAG."
    - model: gemma3:27b
      use_case: web_automation
      fit: none
      reason: "tool_calling=false. Cannot reliably drive browser agent frameworks."

    # Llama — broad ecosystem
    - model: llama3.1:8b
      use_case: web_automation
      fit: standard
      reason: "Reliable tool calling. Well-supported in LangChain/LangGraph ecosystem."
    - model: llama3.3:70b
      use_case: multi_agent
      fit: strong
      reason: "Strong reasoning and tool calling at 70B. Good alternative to Qwen 72B."
    - model: llama3.2:3b
      use_case: local_copilot
      fit: strong
      reason: "Fast enough for real-time autocomplete. Works in Continue IDE extension."

    # Phi-4 — reasoning strength
    - model: phi4:14b
      use_case: code_generation
      fit: strong
      reason: "Microsoft Phi-4 outperforms many larger models on coding benchmarks at 14B."
    - model: phi4:14b
      use_case: code_review
      fit: standard
      reason: "Good code understanding but standard-plus quality may miss subtle architecture issues."

    # Mistral — ecosystem fit
    - model: mistral:7b
      use_case: web_automation
      fit: standard
      reason: "Solid function calling support. Well-tested with LangChain tool ecosystems."
    - model: mistral:7b
      use_case: local_copilot
      fit: standard
      reason: "Fast 7B model. Compatible with Continue IDE extension via Ollama."

    # Writing / RAG — tool_calling not required
    - model: gemma3:12b
      use_case: writing_assistant
      fit: strong
      reason: "Strong instruction following and language quality. No tool calling needed for writing."
    - model: gemma3:27b
      use_case: writing_assistant
      fit: strong
      reason: "Pro-tier language quality without needing function calls."
    - model: phi4:14b
      use_case: writing_assistant
      fit: strong
      reason: "Phi-4 excels at text quality, style, and clarity improvements."
    - model: deepseek-r1:8b
      use_case: deep_research
      fit: standard
      reason: "Chain-of-thought helps with multi-step synthesis but 8B size limits coverage."
    - model: deepseek-r1:32b
      use_case: deep_research
      fit: strong
      reason: "Best open-weight reasoning model for long-form multi-source research synthesis."
    - model: llama3.3:70b
      use_case: deep_research
      fit: strong
      reason: "Strong instruction following at 70B handles complex research pipelines."

    # Schedule tasks — lightweight is fine
    - model: llama3.2:3b
      use_case: schedule_task
      fit: strong
      reason: "Minimal memory footprint. Good for always-on background task execution."
    - model: qwen3.5:4b
      use_case: schedule_task
      fit: strong
      reason: "Light tier. Reliable tool calling for simple scheduled actions."

  # ── Model ↔ Framework Fit ────────────────────────────────
  # relation: framework_suits_use_case (model-family dimension)
  # rationale: runtime_support[] captures technical compatibility,
  #   but model family × framework ecosystem affinity is not derivable.
  #   These notes guide copilot when a user specifies a preferred model family.

  model_framework_fit:

    # Qwen — qwen-agent is the native home
    - model_family: qwen
      framework: qwen-agent
      fit: native
      reason: >
        Qwen models are the primary development target for qwen-agent.
        Function calling, MCP tools, and RAG pipelines are tested and tuned
        for Qwen series first. Prefer qwen-agent when running any Qwen model.
    - model_family: qwen
      framework: smolagents
      fit: strong
      reason: "smolagents supports Ollama natively. Qwen tool calling is reliable."
    - model_family: qwen
      framework: crewai
      fit: strong
      reason: "Qwen standard-plus/pro tiers handle role coordination well."

    # Llama — LangChain/LangGraph is the native ecosystem
    - model_family: llama
      framework: langgraph
      fit: native
      reason: >
        Meta Llama is the primary target model in most LangChain/LangGraph examples.
        The ecosystem is most tested with Llama models via OllamaFunctions.
    - model_family: llama
      framework: crewai
      fit: strong
      reason: "Llama 3.1/3.3 tool calling is well-tested in CrewAI agent patterns."
    - model_family: llama
      framework: smolagents
      fit: strong
      reason: "smolagents works well with Llama via Ollama. Good code execution support."

    # Mistral — LangChain / LangGraph ecosystem
    - model_family: mistral
      framework: langgraph
      fit: strong
      reason: "LangChain has a dedicated MistralAI integration. OllamaFunctions also works."
    - model_family: mistral
      framework: smolagents
      fit: strong
      reason: "Mistral 7B tool calling is reliable in smolagents CodeAgent."

    # Gemma — no tool calling; limit to non-agent frameworks
    - model_family: gemma
      framework: open-webui
      fit: strong
      reason: "No tool calling required. Gemma's language quality shines in chat."
    - model_family: gemma
      framework: anythingllm
      fit: strong
      reason: "Built-in RAG in AnythingLLM bypasses tool calling — suits Gemma well."
    - model_family: gemma
      framework: llamaindex
      fit: strong
      reason: "LlamaIndex can use Gemma as the LLM for RAG without function calls."
    - model_family: gemma
      framework: smolagents
      fit: weak
      reason: "Gemma lacks reliable tool calling. CodeAgent will fail on tool-use tasks."
    - model_family: gemma
      framework: crewai
      fit: none
      reason: "CrewAI relies on function calling for role coordination. Gemma is incompatible."

    # Phi-4 — reasoning strength, works best with structured frameworks
    - model_family: phi4
      framework: smolagents
      fit: strong
      reason: "Phi-4 strong code generation makes it a good fit for CodeAgent pattern."
    - model_family: phi4
      framework: continue
      fit: strong
      reason: "Excellent code quality for IDE autocomplete with fast enough latency at 14B."

    # DeepSeek-R1 — batch only, no agent loops
    - model_family: deepseek-r1
      framework: langgraph
      fit: weak
      reason: >
        Reasoning models generate long think tokens before responding.
        Real-time agent loops become too slow. Use for offline evaluation nodes only.
    - model_family: deepseek-r1
      framework: open-webui
      fit: strong
      reason: "Chat UI works well for interactive reasoning. Thinking tokens are shown inline."
    - model_family: deepseek-r1
      framework: llamaindex
      fit: strong
      reason: "Batch document analysis and Q&A pipelines benefit from chain-of-thought."

    # New frameworks — model family fit

    # AutoGen
    - model_family: qwen
      framework: autogen
      fit: strong
      reason: "Qwen's reliable tool calling enables clean AssistantAgent → UserProxyAgent loops."
    - model_family: llama
      framework: autogen
      fit: strong
      reason: "Llama 3.1/3.3 tool calling is well-tested in AutoGen via OpenAI-compat endpoint."
    - model_family: gemma
      framework: autogen
      fit: none
      reason: "Gemma has no tool calling. AutoGen agent patterns require function execution."

    # Agno
    - model_family: qwen
      framework: agno
      fit: strong
      reason: "Qwen models integrate directly with Agno via Ollama. Native tool calling support."
    - model_family: llama
      framework: agno
      fit: strong
      reason: "Agno's Ollama integration works well with Llama 3.x tool calling."
    - model_family: gemma
      framework: agno
      fit: weak
      reason: "Agno tool-use agents rely on function calling. Gemma's lack of tool calling limits utility."

    # OpenHands
    - model_family: qwen
      framework: openhands
      fit: strong
      reason: "qwen3.5:35b-a3b MoE provides the pro-tier reasoning needed for reliable code execution."
    - model_family: llama
      framework: openhands
      fit: strong
      reason: "Llama 3.3 70B handles multi-step coding tasks well. Requires 64GB+ device."
    - model_family: deepseek-r1
      framework: openhands
      fit: standard
      reason: "Reasoning helps with complex debugging but tool_calling=false limits direct function use."

    # Haystack
    - model_family: qwen
      framework: haystack
      fit: strong
      reason: "Qwen models via Ollama integrate cleanly with Haystack's OllamaGenerator."
    - model_family: gemma
      framework: haystack
      fit: strong
      reason: "Gemma's strong language quality works well for Haystack RAG pipelines (no tool calling needed)."

    # Dify
    - model_family: qwen
      framework: dify
      fit: strong
      reason: "Dify's Ollama provider works out-of-the-box with Qwen models."
    - model_family: gemma
      framework: dify
      fit: strong
      reason: "Gemma chat quality is excellent in Dify's no-code workflows."
    - model_family: deepseek-r1
      framework: dify
      fit: standard
      reason: "Thinking tokens visible in Dify chat. Useful for transparent reasoning workflows."

  # ── Device ↔ Model Fit (explicit) ───────────────────────
  # relation: device_runs_model (special cases)
  # rationale: derivation covers memory threshold checks,
  #   but speed-quality trade-offs, thermal risk, and tier mismatch
  #   for specific device-model pairs need explicit curation.

  device_model_fit:

    # MacBook Air 8GB — tight constraints
    - device: macbook_air_8gb
      model: "llama3.2:3b"
      fit: good
      reason: "3B fits easily. Fast and usable for local_copilot and simple Q&A."
    - device: macbook_air_8gb
      model: "qwen3.5:4b"
      fit: good
      reason: "4B sweet spot for 8GB. Reliable tool calling on minimal hardware."
    - device: macbook_air_8gb
      model: "gemma3:4b"
      fit: good
      reason: "Good language quality within 8GB. No tool calling is fine for general_qa."
    - device: macbook_air_8gb
      model: "qwen3.5:9b"
      fit: marginal
      reason: >
        9B technically fits (8GB model + 8GB device is tight).
        May swap under system load. Throttling risk on sustained inference.
        Not recommended for production agent use on 8GB.

    # MacBook 16GB — standard workhorse
    - device: macbook_16gb
      model: "qwen3.5:9b"
      fit: excellent
      reason: "Primary recommendation. 20-35 t/s. Best daily-driver on 16GB Apple Silicon."
    - device: macbook_16gb
      model: "mistral:7b"
      fit: good
      reason: "Good alternative to qwen3.5:9b. Strong LangChain ecosystem fit."
    - device: macbook_16gb
      model: "llama3.1:8b"
      fit: good
      reason: "Reliable tool calling. Fits comfortably in 16GB with room for context."
    - device: macbook_16gb
      model: "gemma3:12b"
      fit: good
      reason: "12B fits in 16GB. Good for writing and RAG without needing tool calls."
    - device: macbook_16gb
      model: "phi4:14b"
      fit: marginal
      reason: >
        14B on 16GB is tight. Works but leaves little room for context.
        Recommend 32GB+ for phi4:14b in production agent use.

    # Mac Mini M4 32GB — sweet spot device
    - device: mac_mini_m4_32gb
      model: "qwen3.5:35b-a3b"
      fit: excellent
      reason: "The defining pairing. MoE activates 3B, achieving 27B quality at 18-25 t/s."
    - device: mac_mini_m4_32gb
      model: "deepseek-r1:8b"
      fit: good
      reason: "32GB has plenty of headroom. Good for offline reasoning jobs on always-on server."
    - device: mac_mini_m4_32gb
      model: "gemma3:27b"
      fit: good
      reason: "27B fits in 32GB. Slower than MoE but excellent for writing/RAG workloads."
    - device: mac_mini_m4_32gb
      model: "qwen3.5:27b"
      fit: good
      reason: "Dense 27B fits but runs slower than 35b-a3b MoE (~10-15 t/s vs ~20 t/s)."

    # Mac Mini Pro 48GB
    - device: mac_mini_pro_48gb
      model: "llama3.3:70b"
      fit: good
      reason: "70B requires 64GB minimum — fits on 48GB only with aggressive quantization (Q2/Q3). Verify before relying on this."
    - device: mac_mini_pro_48gb
      model: "deepseek-r1:32b"
      fit: excellent
      reason: "32B fits with ample headroom. M4 Pro bandwidth enables good throughput."

    # PC RTX 4060 — CUDA entry tier
    - device: pc_rtx4060
      model: "mistral:7b"
      fit: excellent
      reason: "7B fits entirely in 8GB VRAM. CUDA + Mistral is a popular Windows stack."
    - device: pc_rtx4060
      model: "llama3.1:8b"
      fit: good
      reason: "8B fits in 8GB VRAM. Standard Windows/Linux CUDA inference."
    - device: pc_rtx4060
      model: "qwen3.5:9b"
      fit: marginal
      reason: >
        9B slightly exceeds 8GB VRAM. Some layers spill to CPU RAM.
        Results in mixed CUDA/CPU inference — slower but functional.

    # PC RTX 4090 — pro CUDA tier
    - device: pc_rtx4090
      model: "qwen3.5:27b"
      fit: excellent
      reason: "27B fits in 24GB VRAM entirely. ~40-50 t/s. Best CUDA dense model pairing."
    - device: pc_rtx4090
      model: "deepseek-r1:32b"
      fit: marginal
      reason: >
        32B exceeds 24GB VRAM. Partial CPU offload required.
        Still functional for batch reasoning but not optimal.

  # ── API → Local Paths (expanded) ────────────────────────
  # Additional paths for Mistral API

  api_to_local_paths_extended:

    - from_api: mistral-small
      quality: standard
      local_model: "mistral:7b"
      min_device: mac_mini_16gb
      recommended_device: mac_mini_m4_32gb
      reason: >
        mistral:7b is the direct local equivalent of Mistral Small API.
        Users already familiar with Mistral's behavior will get the most
        consistent local experience using the same model family.

    - from_api: mistral-large
      quality: pro
      local_model: "qwen3.5:35b-a3b"
      min_device: mac_mini_m4_32gb
      recommended_device: mac_mini_pro_48gb
      reason: >
        No open-weight Mistral Large equivalent is Ollama-pullable at this tier.
        qwen3.5:35b-a3b provides comparable pro-tier quality at similar cost.
        Users wanting Mistral-family continuity can use mistral:7b but accept quality downgrade.
